            backdrop-filter: blur(4px);
            border-radius: 2.5rem;

            padding: 2rem 1.8rem;
            border: 1px solid rgba(80, 130, 115, 0.25);

            font-size: 1.9rem;

            background: linear-gradient(135deg, #1d6c5e, #2b9b87);

            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-align: center;

            color: #557c70;
            margin-bottom: 2rem;
            font-weight: 500;
        }

            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

            margin: 2rem 0;
        }

            border-radius: 2rem;
            padding: 1rem 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1f6b5e;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .cat-btn:hover {
            background: #e5f4ef;
            border-color: #2b9b87;
            transform: translateY(-3px);
        }

            justify-content: center;
            margin: 2rem 0 1rem;

            border: 2px solid #d4a373;
            color: #6b4e2e;
            font-size: 1.3rem;
            padding: 1.2rem 2rem;
            border-radius: 3rem;
            width: 80%;
            max-width: 350px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-zen:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

            justify-content: space-between;
            background: #eef3f0;
            border-radius: 100px;
            padding: 0.6rem 1.4rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            color: #1f5f54;
        }

        .question-card {
            background: white;
            border-radius: 2rem;
            padding: 1.8rem 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
        }

        .russian-word {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a4e45;
            background: #f4fbf8;
            display: inline-block;
            padding: 0.3rem 1.5rem;
            border-radius: 60px;
            margin-bottom: 0.5rem;
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin: 1.5rem 0 1rem;
        }

        .answer-btn {
            background: #f9fefc;
            border: 2px solid #cde3dc;
            border-radius: 60px;
            padding: 0.9rem;
            font-size: 1.15rem;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: #216b5e;
            cursor: pointer;
            transition: all 0.2s;
        }

            background: #e5f4ef;
            border-color: #6fc1b0;
        }

            background: #c8f0e4;
            border-color: #169b80;
            color: #0c5c4b;
            box-shadow: 0 0 0 2px #b3e0d4;
        }

            border-color: #e0826e;
            color: #9b3e2c;
        }

            opacity: 0.8;

            background: #f8fefb;
            padding: 1rem;
            border-radius: 1.5rem;
            margin: 1rem 0;

            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 3rem;
            color: white;
            cursor: pointer;

</head>

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

        return ALL_WORDS.filter(w => w.category === catId);

        const others = pool.filter(item => item.rus !== currentRus);
        const shuffled = shuffleArray([...others]);

        let opts = [correctWord, ...wrong];
        opts = [...new Set(opts)];
        while (opts.length < 3) opts.push("бүлмә");
        return shuffleArray(opts.slice(0, 3));
    }

    // Глобальное состояние
    let currentMode = "menu"; // menu, quiz, zen
    let currentCategoryId = null;
    let currentQuestions = [];
    let currentIndex = 0;
    let currentScore = 0;
    let answerLock = false;
    let answered = false;
    let currentCorrect = "";
    let currentExample = "";
    let currentTranslation = "";
    
    // Дзен
    let zenModeActive = false;
    let zenIndex = 0;
    let zenScore = 0;
    let zenQuestionsPool = [];
    let zenMaxQuestions = 100;
    
    const app = document.getElementById('app');

    function renderMenu() {
        let btnsHtml = '';
        CATEGORIES.forEach(cat => {
            btnsHtml += `<button class="cat-btn" data-cat="${cat.id}">${cat.name}<br><span style="font-size:0.7rem;">${cat.desc}</span></button>`;
        });
        const html = `
            <h1>📖 Татарский тренажёр</h1>
            <div class="sub">6 категорий по 10 вопросов</div>
            <div class="categories-grid">
                ${btnsHtml}
            </div>
            <div class="zen-wrapper">
                <button class="cat-btn btn-zen" id="zenModeBtn">🧘‍♂️ Дзен<br><span style="font-size:0.8rem;">все слова</span></button>
            </div>
            <footer>Существительные с примерами и переводами</footer>
        `;
        app.innerHTML = html;
        document.querySelectorAll('.cat-btn[data-cat]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const catId = btn.getAttribute('data-cat');
                startCategoryQuiz(catId);
            });
        });
        const zenBtn = document.getElementById('zenModeBtn');
        if (zenBtn) zenBtn.addEventListener('click', startZenMode);
    }

    function startCategoryQuiz(catId) {
        const words = getWordsByCategory(catId);
        if (words.length < 10) {
            alert("В этой категории недостаточно слов (нужно минимум 10).");
            return;
        }
        const shuffledWords = shuffleArray([...words]);
        const selected = shuffledWords.slice(0, 10);
        currentQuestions = selected.map(word => ({
            rus: word.rus,
            correct: word.tat,
            tatExample: word.example,
            exampleTranslation: word.translation,
            options: generateOptions(word.tat, word.rus, words)
        }));
        currentIndex = 0;
        currentScore = 0;
        currentMode = "quiz";
        currentCategoryId = catId;
        answerLock = false;
        answered = false;
        renderQuiz();
    }

    function renderQuiz() {
        if (currentIndex >= currentQuestions.length) {
            showQuizResult();
            return;
        }
        const q = currentQuestions[currentIndex];
        currentCorrect = q.correct;
        currentExample = q.tatExample;
        currentTranslation = q.exampleTranslation;
        const progress = `${currentIndex+1} / ${currentQuestions.length}`;
        let answersHtml = '';
        q.options.forEach(opt => {
            answersHtml += `<button class="answer-btn" data-value="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`;
        });
        const markup = `
            <div>
                <div class="stats">
                    <span>🎯 Счёт: ${currentScore}</span>
                    <span>📋 Вопрос ${progress}</span>
                </div>
                <div class="question-card">
                    <div class="russian-word">${escapeHtml(q.rus)}</div>
                    <div class="answers-grid" id="answersGrid">
                        ${answersHtml}
                    </div>
                    <div id="feedbackArea" class="feedback-area" style="display: none;"></div>
                    <button id="nextBtn" class="next-btn" disabled>➡ Следующий вопрос</button>
                    <button id="backMenuBtn" class="back-menu-btn">🏠 На главную</button>
                </div>
                <footer>Выберите правильный перевод на татарский</footer>
            </div>
        `;
        app.innerHTML = markup;
        attachQuizHandlers();
    }

    function attachQuizHandlers() {
        const btns = document.querySelectorAll('.answer-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (answerLock) return;
                const selected = btn.getAttribute('data-value');
                checkQuizAnswer(selected, btns);
            });
        });
        const backBtn = document.getElementById('backMenuBtn');
        if (backBtn) backBtn.addEventListener('click', () => { currentMode = "menu"; renderMenu(); });
    }

    function checkQuizAnswer(selected, allBtns) {
        if (answered) return;
        answered = true;
        answerLock = true;
        const isCorrect = (selected === currentCorrect);
        if (isCorrect) currentScore++;

        allBtns.forEach(btn => {
            const val = btn.getAttribute('data-value');
            if (val === currentCorrect) btn.classList.add('correct-highlight');
            if (!isCorrect && val === selected) btn.classList.add('wrong-highlight');
            btn.disabled = true;
            btn.classList.add('disabled-btn');
        });

        const feedbackDiv = document.getElementById('feedbackArea');
        let feedbackHtml = '';
        if (isCorrect) {
            feedbackHtml = `<div class="feedback-correct">✅ Правильно! +1 балл.</div>`;
            if (currentExample && currentTranslation) {
                feedbackHtml += `<div class="example-text">📖 Пример: <strong>${escapeHtml(currentExample)}</strong><br>📝 Перевод: ${escapeHtml(currentTranslation)}</div>`;
            }
        } else {
            feedbackHtml = `<div class="feedback-correct">❌ Неправильно. Правильный ответ: <strong>${escapeHtml(currentCorrect)}</strong></div>`;
        }
        feedbackDiv.innerHTML = feedbackHtml;
        feedbackDiv.style.display = 'block';

        const nextBtn = document.getElementById('nextBtn');
        nextBtn.disabled = false;
        nextBtn.addEventListener('click', () => {
            currentIndex++;
            answered = false;
            answerLock = false;
            renderQuiz();
        }, { once: true });
    }

    function showQuizResult() {
        const total = currentQuestions.length;
        let verdict = "";
        if (currentScore === total) verdict = "🎉 Отлично! Вы знаток! 🎉";
        else if (currentScore >= 8) verdict = "👍 Очень хорошо!";
        else if (currentScore >= 6) verdict = "📘 Неплохо, повторите ещё.";
        else verdict = "😓 Нужно подтянуть.";
        
        const markup = `
            <div class="result-screen">
                <h1>🏆 Результат</h1>
                <div class="score-ring">${currentScore} / ${total}</div>
                <div class="verdict">${verdict}</div>
                <button id="restartCatBtn" class="btn-restart">🔄 Ещё раз (та же категория)</button>
                <button id="menuAfterBtn" class="back-menu-btn">🏠 На главную</button>
            </div>
        `;
        app.innerHTML = markup;
        document.getElementById('restartCatBtn')?.addEventListener('click', () => startCategoryQuiz(currentCategoryId));
        document.getElementById('menuAfterBtn')?.addEventListener('click', () => { currentMode = "menu"; renderMenu(); });
    }

    // -------------------- ДЗЕН (все слова, до 100) --------------------
    function startZenMode() {
        const allWords = [...ALL_WORDS];
        if (allWords.length === 0) return;
        const shuffledPool = shuffleArray([...allWords]);
        zenQuestionsPool = shuffledPool.slice(0, zenMaxQuestions);
        zenIndex = 0;
        zenScore = 0;
        zenModeActive = true;
        currentMode = "zen";
        renderZenQuestion();
    }

    function renderZenQuestion() {
        if (zenIndex >= zenQuestionsPool.length) {
            showZenResult();
            return;
        }
        const q = zenQuestionsPool[zenIndex];
        currentCorrect = q.tat;
        currentExample = q.example;
        currentTranslation = q.translation;
        const allWordsList = [...ALL_WORDS];
        const options = generateOptions(q.tat, q.rus, allWordsList);
        const progress = `${zenIndex+1} / ${zenQuestionsPool.length}`;
        let answersHtml = '';
        options.forEach(opt => {
            answersHtml += `<button class="answer-btn" data-value="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`;
        });
        const markup = `
            <div>
                <div class="stats">
                    <span>🎯 Счёт: ${zenScore}</span>
                    <span>🧘 Дзен • ${progress}</span>
                </div>
                <div class="question-card">
                    <div class="russian-word">${escapeHtml(q.rus)}</div>
                    <div class="answers-grid" id="answersGrid">
                        ${answersHtml}
                    </div>
                    <div id="feedbackArea" class="feedback-area" style="display: none;"></div>
                    <button id="nextZenBtn" class="next-btn" disabled>➡ Следующий вопрос</button>
                    <button id="exitZenBtn" class="back-menu-btn">🏁 Завершить Дзен и выйти</button>
                </div>
                <footer>Дзен-режим: все слова, максимум ${zenQuestionsPool.length} вопросов</footer>
            </div>
        `;
        app.innerHTML = markup;
        attachZenHandlers();
    }

    function attachZenHandlers() {
        const btns = document.querySelectorAll('.answer-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (answerLock) return;
                const selected = btn.getAttribute('data-value');
                checkZenAnswer(selected, btns);
            });
        });
        const exitBtn = document.getElementById('exitZenBtn');
        if (exitBtn) exitBtn.addEventListener('click', () => { currentMode = "menu"; renderMenu(); });
    }

    function checkZenAnswer(selected, allBtns) {
        if (answered) return;
        answered = true;
        answerLock = true;
        const isCorrect = (selected === currentCorrect);
        if (isCorrect) zenScore++;

        allBtns.forEach(btn => {
            const val = btn.getAttribute('data-value');
            if (val === currentCorrect) btn.classList.add('correct-highlight');
            if (!isCorrect && val === selected) btn.classList.add('wrong-highlight');
            btn.disabled = true;
            btn.classList.add('disabled-btn');
        });

        const feedbackDiv = document.getElementById('feedbackArea');
        let feedbackHtml = '';
        if (isCorrect) {
            feedbackHtml = `<div class="feedback-correct">✅ Верно! +1 балл.</div>`;
            if (currentExample && currentTranslation) {
                feedbackHtml += `<div class="example-text">📖 Пример: <strong>${escapeHtml(currentExample)}</strong><br>📝 Перевод: ${escapeHtml(currentTranslation)}</div>`;
            }
        } else {
            feedbackHtml = `<div class="feedback-correct">❌ Ошибка. Правильно: <strong>${escapeHtml(currentCorrect)}</strong></div>`;
        }
        feedbackDiv.innerHTML = feedbackHtml;
        feedbackDiv.style.display = 'block';

        const nextBtn = document.getElementById('nextZenBtn');
        nextBtn.disabled = false;
        nextBtn.addEventListener('click', () => {
            zenIndex++;
            answered = false;
            answerLock = false;
            renderZenQuestion();
        }, { once: true });
    }

    function showZenResult() {
        const total = zenQuestionsPool.length;
        let verdict = "";
        if (zenScore === total) verdict = "🎉 Просветление! Идеальный результат! 🎉";
        else if (zenScore >= total * 0.8) verdict = "👍 Отличная практика!";
        else if (zenScore >= total * 0.6) verdict = "📘 Хорошо, но есть куда расти.";
        else verdict = "😓 Продолжайте практиковаться!";
        
        const markup = `
            <div class="result-screen">
                <h1>🧘 Дзен завершён</h1>
                <div class="score-ring">${zenScore} / ${total}</div>
                <div class="verdict">${verdict}</div>
                <button id="restartZenBtn" class="btn-restart">🔄 Начать Дзен заново</button>
                <button id="menuAfterZenBtn" class="back-menu-btn">🏠 На главную</button>
            </div>
        `;
        app.innerHTML = markup;
        document.getElementById('restartZenBtn')?.addEventListener('click', startZenMode);
        document.getElementById('menuAfterZenBtn')?.addEventListener('click', () => { currentMode = "menu"; renderMenu(); });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    renderMenu();
</script>
</body>
</html>
