<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Татарский тренажёр: существительные</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f6f3 0%, #e2ece8 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(4px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3);
            padding: 2rem 1.8rem 2rem;
            border: 1px solid rgba(80, 130, 115, 0.25);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1d6c5e, #2b9b87);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }

        .sub {
            color: #557c70;
            font-weight: 500;
            margin-bottom: 1.6rem;
            border-left: 3px solid #359f8b;
            padding-left: 0.8rem;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: #eef3f0;
            border-radius: 100px;
            padding: 0.6rem 1.4rem;
            margin-bottom: 2rem;
            font-weight: 600;
            color: #1f5f54;
        }

        .question-card {
            background: white;
            border-radius: 2rem;
            padding: 1.8rem 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
        }

        .russian-word {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a4e45;
            background: #f4fbf8;
            display: inline-block;
            padding: 0.3rem 1.5rem;
            border-radius: 60px;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin: 1.5rem 0 1rem;
        }

        .answer-btn {
            background: #f9fefc;
            border: 2px solid #cde3dc;
            border-radius: 60px;
            padding: 0.9rem 1rem;
            font-size: 1.15rem;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: #216b5e;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .answer-btn:hover:not(:disabled) {
            background: #e5f4ef;
            border-color: #6fc1b0;
            transform: scale(1.01);
        }

        .answer-btn.correct-highlight {
            background: #c8f0e4;
            border-color: #169b80;
            color: #0c5c4b;
            box-shadow: 0 0 0 2px #b3e0d4;
        }

        .answer-btn.wrong-highlight {
            background: #ffe0db;
            border-color: #e0826e;
            color: #9b3e2c;
        }

        .disabled-btn {
            cursor: default;
            opacity: 0.8;
        }

        .feedback-area {
            background: #f8fefb;
            padding: 1rem 1rem;
            border-radius: 1.5rem;
            margin: 1rem 0;
            text-align: left;
            font-size: 0.95rem;
            border-left: 5px solid #2b9b87;
        }

        .feedback-correct {
            color: #1d6c5e;
            font-weight: 600;
        }

        .example-text {
            background: #f0f5f2;
            padding: 0.6rem;
            border-radius: 1rem;
            margin-top: 0.6rem;
            font-family: monospace;
        }

        .next-btn {
            background: #2b9b87;
            border: none;
            padding: 0.9rem 1.8rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 3rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 0.5rem;
        }

        .next-btn:hover {
            background: #1e7f6e;
            transform: translateY(-2px);
        }

        .next-btn:disabled {
            background: #aacbc2;
            cursor: not-allowed;
            transform: none;
        }

        .result-screen {
            text-align: center;
        }

        .score-ring {
            font-size: 3.5rem;
            font-weight: 800;
            background: #f2f9f6;
            display: inline-block;
            padding: 0.5rem 1.8rem;
            border-radius: 100px;
            margin: 1rem 0;
            color: #236b5e;
        }

        .verdict {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0.8rem 0;
        }

        .btn-restart {
            background: #2b9b87;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1.1rem;
            border-radius: 3rem;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            text-align: center;
            color: #85ada2;
        }
    </style>
</head>

        { rus: "город", tat: "шәһәр", example: "Казан зур шәһәр.", translation: "Казань — большой город." },
        { rus: "столица", tat: "башкала", example: "Казан — башкала.", translation: "Казань — столица." },
        { rus: "улица", tat: "урам", example: "Урамда кешеләр күп.", translation: "На улице много людей." },
        { rus: "дорога", tat: "юл", example: "Юл озын.", translation: "Дорога длинная." },
        { rus: "магазин", tat: "кибет", example: "Кибеткә кердем.", translation: "Я зашёл в магазин." },
        { rus: "рынок", tat: "базар", example: "Базарда яшелчәләр саталар.", translation: "На рынке продают овощи." },
        { rus: "больница", tat: "хастаханә", example: "Хастаханәдә эшли.", translation: "Работает в больнице." },
        { rus: "автобус", tat: "автобус", example: "Автобус монда йөрми.", translation: "Автобус здесь не ходит." },
        { rus: "машина", tat: "машина", example: "Машина йөртә.", translation: "Водит машину." },
        
        // --- Время, сезоны ---
        { rus: "время", tat: "вакыт", example: "Вакыт тиз уза.", translation: "Время быстро идёт." },
        { rus: "день", tat: "көн", example: "Бүген яхшы көн.", translation: "Сегодня хороший день." },
        { rus: "ночь", tat: "төн", example: "Төн озын.", translation: "Ночь длинная." },
        { rus: "неделя", tat: "атна", example: "Атнада биш көн эшлибез.", translation: "В неделю работаем пять дней." },
        { rus: "весна", tat: "яз", example: "Яз җитте.", translation: "Весна наступила." },
        { rus: "лето", tat: "җәй", example: "Җәйдә кояшлы.", translation: "Летом солнечно." },
        { rus: "осень", tat: "көз", example: "Көзен салкын.", translation: "Осенью холодно." },
        { rus: "зима", tat: "кыш", example: "Кышын кар күп.", translation: "Зимой много снега." }
    ];

    // Вспомогательные функции
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Генерация 3 вариантов: правильный + два случайных неправильных
    function generateOptions(correctWord, currentRus, allItems) {
        const others = allItems.filter(item => item.rus !== currentRus);
        if (others.length < 2) return [correctWord, "китап", "өстәл"];
        const shuffled = shuffleArray([...others]);
        const wrong = [shuffled[0].tat, shuffled[1].tat];
        let opts = [correctWord, ...wrong];
        opts = [...new Set(opts)];
        while (opts.length < 3) opts.push("бүлмә");
        return shuffleArray(opts.slice(0, 3));
    }

    // Подготовка 10 случайных вопросов
    function prepareQuestions() {
        const shuffledAll = shuffleArray([...NOUNS_DATA]);
        const selected = shuffledAll.slice(0, 10);
        return selected.map(item => ({
            rus: item.rus,
            correct: item.tat,
            tatExample: item.example,
            exampleTranslation: item.translation,
            options: generateOptions(item.tat, item.rus, NOUNS_DATA)
        }));
    }

    // Оценка результата (как в глаголах)
    function getVerdict(scoreValue) {
        if (scoreValue === 10) return { title: "🎉 Отлично! Вы знаток татарских слов! 🎉", message: "10 из 10! Безупречно!" };
        if (scoreValue >= 8) return { title: "👍 Очень хорошо!", message: `${scoreValue} правильных. Вы на верном пути!` };
        if (scoreValue >= 6) return { title: "📘 Неплохо", message: `${scoreValue} верных. Повторите ещё — и будет отлично.` };
        return { title: "😓 Нужно подтянуть", message: `${scoreValue} правильных. Попробуйте ещё раз, слова запомнятся!` };
    }

    // --- Игровое состояние ---
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answerLock = false;      // блокировка после ответа
    let answered = false;
    let currentCorrectWord = "";
    let currentExample = "";
    let currentTranslation = "";
    let currentOptions = [];

    const app = document.getElementById('app');

    function renderQuestion() {
        if (currentIndex >= currentQuestions.length) {
            showResult();
            return;
        }
        const q = currentQuestions[currentIndex];
        currentCorrectWord = q.correct;
        currentExample = q.tatExample;
        currentTranslation = q.exampleTranslation;
        currentOptions = q.options;
        const progress = `${currentIndex+1} / ${currentQuestions.length}`;

        let answersHtml = '';
        currentOptions.forEach(opt => {
            answersHtml += `<button class="answer-btn" data-value="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`;
        });

        const markup = `
            <div>
                <div class="stats">
                    <span>🎯 Счёт: ${score}</span>
                    <span>📋 Вопрос ${progress}</span>
                </div>
                <div class="question-card">
                    <div class="russian-word">${escapeHtml(q.rus)}</div>
                    <div class="answers-grid" id="answersGrid">
                        ${answersHtml}
                    </div>
                    <div id="feedbackArea" class="feedback-area" style="display: none;"></div>
                    <button id="nextBtn" class="next-btn" disabled>➡ Следующий вопрос</button>
                </div>
                <footer>Выберите правильный перевод на татарский</footer>
            </div>
        `;
        app.innerHTML = markup;

        // Навешиваем обработчики на кнопки ответов
        const btns = document.querySelectorAll('.answer-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (answerLock) return;
                const selected = btn.getAttribute('data-value');
                checkAnswer(selected, btns);
            });
        });
        answerLock = false;
        answered = false;
    }

    function checkAnswer(selected, allBtns) {
        if (answered) return;
        answered = true;
        answerLock = true;
        const isCorrect = (selected === currentCorrectWord);
        if (isCorrect) score++;

        // Подсветка
        allBtns.forEach(btn => {
            const val = btn.getAttribute('data-value');
            if (val === currentCorrectWord) btn.classList.add('correct-highlight');
            if (!isCorrect && val === selected) btn.classList.add('wrong-highlight');
            btn.disabled = true;
            btn.classList.add('disabled-btn');
        });

        const feedbackDiv = document.getElementById('feedbackArea');
        let feedbackHtml = '';
        if (isCorrect) {
            feedbackHtml = `<div class="feedback-correct">✅ Правильно! +1 балл.</div>`;
            if (currentExample && currentTranslation) {
                feedbackHtml += `<div class="example-text">📖 Пример: <strong>${escapeHtml(currentExample)}</strong><br>📝 Перевод: ${escapeHtml(currentTranslation)}</div>`;
            } else {
                feedbackHtml += `<div class="example-text">✨ Отличная работа!</div>`;
            }
        } else {
            feedbackHtml = `<div class="feedback-correct">❌ Неправильно. Правильный ответ: <strong>${escapeHtml(currentCorrectWord)}</strong></div>`;
        }
        feedbackDiv.innerHTML = feedbackHtml;
        feedbackDiv.style.display = 'block';

        // Активируем кнопку "Следующий вопрос"
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.disabled = false;
        nextBtn.addEventListener('click', () => {
            currentIndex++;
            answered = false;
            answerLock = false;
            renderQuestion();
        }, { once: true });
    }

    function showResult() {
        const verdict = getVerdict(score);
        app.innerHTML = `
            <div class="result-screen">
                <h1>🏆 Тренировка завершена</h1>
                <div class="score-ring">${score} / 10</div>
                <div class="verdict">${verdict.title}</div>
                <div class="verdict-message">${verdict.message}</div>
                <button class="btn-restart" id="restartBtn">🔄 Сыграть ещё раз</button>
                <footer>Татарские существительные с примерами</footer>
            </div>
        `;
        document.getElementById('restartBtn')?.addEventListener('click', () => initGame());
    }

    function initGame() {
        currentQuestions = prepareQuestions();
        currentIndex = 0;
        score = 0;
        answerLock = false;
        answered = false;
        renderQuestion();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    initGame();
</script>
</body>
